name = "praxmate-api"
main = "src/index.js"
compatibility_date = "2026-04-20"

[[d1_databases]]
binding = "DB"
database_name = "praxmate"
database_id = "d9548a59-aead-4d13-b082-ad82f602cfe4"

[[r2_buckets]]
binding = "R2"
bucket_name = "hasi-elektronic"

[vars]
R2_PUBLIC_URL = "https://pub-cf131f1d711447e384202db821c79449.r2.dev"
SUPER_ADMIN_EMAIL = "h.guencavdi@hasi-elektronic.de"
RESEND_FROM_EMAIL = "Praxmate <noreply@machbar24.com>"

# Schedules:
#   "0 * * * *"   — hourly: 24h reminder sweep
#   "0 3 * * *"   — daily 03:00 UTC: full DB snapshot to R2 (30d retention)
[triggers]
crons = ["0 * * * *", "0 3 * * *"]
