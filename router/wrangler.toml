name = "praxmate-router"
main = "src/index.js"
compatibility_date = "2026-04-25"

# D1 binding for custom-hostname → tenant lookups (mode 2 routing).
[[d1_databases]]
binding      = "DB"
database_name = "praxmate"
database_id  = "d9548a59-aead-4d13-b082-ad82f602cfe4"

# Wildcard route — captures every *.praxmate.de host
[[routes]]
pattern  = "*.praxmate.de/*"
zone_id  = "56339a93a544c0785b0ab3ab9d0d6293"

# Custom-domain routes are added per-customer when they bind their hostname.
# Customer DNS:  termin.zahnarzthild.de  CNAME  praxmate.pages.dev
# Then we add a Worker Route to this worker for that hostname (manual or via API).
