<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praxmate — Super-Admin · Hasi Elektronic</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2333afe2'/%3E%3Ctext x='50' y='68' font-family='Georgia' font-size='48' font-weight='700' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --hasi: #33afe2;
  --hasi-dark: #1e7ea8;
  --ink: #0f1e2e;
  --ink-soft: #3d5368;
  --muted: #7a8b9c;
  --border: #e1e8ed;
  --bg: #f4f8fa;
  --success: #2d8e5f;
  --danger: #d64545;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f1e2e 0%, #162a3e 50%, #1e3a52 100%);
  min-height: 100vh;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
body::before, body::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
}
body::before {
  top: 10%; left: 10%;
  width: 400px; height: 400px;
  background: rgba(51, 175, 226, 0.3);
  animation: glow1 15s ease-in-out infinite;
}
body::after {
  bottom: 10%; right: 10%;
  width: 500px; height: 500px;
  background: rgba(30, 126, 168, 0.25);
  animation: glow2 18s ease-in-out infinite;
}
@keyframes glow1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(80px, -60px); } }
@keyframes glow2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-60px, 80px); } }

.login-wrap { width: 100%; max-width: 440px; position: relative; z-index: 1; }
.brand { text-align: center; margin-bottom: 32px; }
.brand-logo { display: inline-flex; align-items: center; gap: 12px; color: white; text-decoration: none; }
.brand-mark {
  width: 48px; height: 48px;
  background: var(--hasi);
  color: white;
  border-radius: 12px;
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px rgba(51, 175, 226, 0.4);
}
.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.02em;
}
.brand-sub {
  color: rgba(255, 255, 255, 0.6);
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 700;
  margin-top: 8px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 36px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
}
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--ink);
}
.card-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

.error-box {
  background: #fef2f2;
  color: #991b1b;
  border-left: 3px solid var(--danger);
  padding: 12px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 14px;
}

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-soft);
  margin-bottom: 6px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.field input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 15px;
  background: var(--bg);
  transition: all 0.2s;
}
.field input:focus {
  outline: none;
  border-color: var(--hasi);
  background: white;
  box-shadow: 0 0 0 4px rgba(51, 175, 226, 0.1);
}

.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--hasi) 0%, var(--hasi-dark) 100%);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 6px 18px rgba(51, 175, 226, 0.3);
}
.btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 10px 24px rgba(51, 175, 226, 0.4);
}
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

.footer-note {
  margin-top: 24px;
  text-align: center;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.5);
}
.footer-note a { color: rgba(255, 255, 255, 0.75); }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-mark">H</div>
      <div>
        <div class="brand-name">Praxmate</div>
      </div>
    </div>
    <div class="brand-sub">Super-Admin · Hasi Elektronic</div>
  </div>

  <div class="card">
    <h1 class="card-title">Anmelden</h1>
    <p class="card-sub">Zugang nur für Hamdi Güncavdi</p>

    <div id="errorBox" class="error-box" style="display:none;"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">E-Mail</label>
        <input id="email" type="email" required placeholder="h.guencavdi@hasi-elektronic.de" value="h.guencavdi@hasi-elektronic.de">
      </div>
      <div class="field">
        <label for="password">Passwort</label>
        <input id="password" type="password" required autofocus>
      </div>
      <button type="submit" class="btn" id="submitBtn">Anmelden</button>
    </form>
  </div>

  <div class="footer-note">
    © 2026 Hasi Elektronic · <a href="/">Zurück zur Praxmate-Startseite</a>
  </div>
</div>

<script>
const API_BASE = 'https://praxmate-api.hguencavdi.workers.dev/api';

// If already logged in, go to dashboard
const existingToken = localStorage.getItem('praxmate_super_token');
if (existingToken) {
  fetch(API_BASE + '/admin/auth/me', {
    headers: { 'Authorization': 'Bearer ' + existingToken }
  }).then(r => r.json()).then(d => {
    if (d.user && d.user.email === 'h.guencavdi@hasi-elektronic.de') {
      window.location.href = '/admin/dashboard.html';
    } else {
      localStorage.removeItem('praxmate_super_token');
    }
  }).catch(() => {});
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('errorBox');
  const btn = document.getElementById('submitBtn');

  errorBox.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Anmeldung...';

  try {
    const res = await fetch(API_BASE + '/admin/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Praxmate-Practice': 'hasi',
      },
      body: JSON.stringify({ email, password, trust_device: true })
    });
    const data = await res.json();

    if (!res.ok) {
      errorBox.textContent = data.error || 'Anmeldung fehlgeschlagen';
      errorBox.style.display = 'block';
      return;
    }

    if (data.user.email !== 'h.guencavdi@hasi-elektronic.de') {
      errorBox.textContent = 'Dies ist der Super-Admin-Bereich. Bitte nutze /praxis/ für Kundenzugang.';
      errorBox.style.display = 'block';
      return;
    }

    localStorage.setItem('praxmate_super_token', data.token);
    localStorage.setItem('praxmate_super_user', JSON.stringify(data.user));
    window.location.href = '/admin/dashboard.html';
  } catch (e) {
    errorBox.textContent = 'Netzwerkfehler: ' + e.message;
    errorBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Anmelden';
  }
});
</script>

</body>
</html>
