<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Praxmate — Neues Passwort</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/praxis/_i18n.js"></script>
<style>
  :root {
    --sky:#0ea5e9; --teal:#14b8a6; --ink:#0f172a; --ink-soft:#475569;
    --muted:#64748b; --border:#e2e8f0; --bg:#f8fafc;
    --success:#059669; --danger:#dc2626; --warn:#d97706;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

  .card { background: white; border: 1px solid var(--border); border-radius: 18px; padding: 40px 36px; max-width: 440px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
  @media (max-width: 480px) { .card { padding: 28px 22px; } }

  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; font-weight: 800; font-size: 17px; }
  .brand-dot { width: 32px; height: 32px; }

  h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 6px; }
  .sub { color: var(--ink-soft); font-size: 14px; margin-bottom: 22px; }

  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 15px; background: white; color: var(--ink); }
  input:focus { outline: none; border-color: var(--sky); box-shadow: 0 0 0 3px rgba(14,165,233,0.12); }

  .pw-hint { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 6px; align-items: center; }
  .pw-hint .dot { width: 6px; height: 6px; border-radius: 50%; background: #cbd5e1; }
  .pw-hint.strong .dot { background: var(--success); }
  .pw-hint.mid .dot { background: var(--warn); }
  .pw-hint.weak .dot { background: var(--danger); }

  .form-group { margin-bottom: 14px; }

  .btn { display: block; width: 100%; padding: 13px 20px; margin-top: 18px; background: linear-gradient(135deg, var(--sky), var(--teal)); color: white; border: none; border-radius: 10px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform .1s, box-shadow .15s; }
  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,165,233,0.3); }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }

  .ok-box { padding: 14px 16px; background: #ecfdf5; border: 1px solid #a7f3d0; color: var(--success); border-radius: 10px; font-size: 14px; margin-top: 16px; line-height: 1.5; display: none; }
  .ok-box.visible { display: block; }
  .err-box { padding: 12px 14px; background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); border-radius: 10px; font-size: 13px; margin-bottom: 14px; display: none; }
  .err-box.visible { display: block; }

  .footer-link { text-align: center; font-size: 13px; color: var(--muted); margin-top: 20px; }
  .footer-link a { color: var(--sky); font-weight: 600; text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }

  .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: -2px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="brand-dot">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block">
        <defs><linearGradient id="pmg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0ea5e9"/><stop offset="50%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#14b8a6"/>
        </linearGradient></defs>
        <circle cx="20" cy="20" r="14" fill="none" stroke="url(#pmg)" stroke-width="4"/>
        <circle cx="25.25" cy="14.45" r="3.1" fill="#0f172a"/>
      </svg>
    </span>
    <span>Praxmate</span>
  </div>

  <h1 id="title">Neues Passwort festlegen</h1>
  <p class="sub" id="subtitle">Geben Sie Ihr neues Passwort zwei Mal ein. Min. 8 Zeichen.</p>

  <div class="err-box" id="errBox"></div>

  <form id="resetForm">
    <div class="form-group">
      <label for="pw1" id="lblPw1">Neues Passwort</label>
      <input id="pw1" type="password" required minlength="8" autocomplete="new-password" placeholder="••••••••">
      <div class="pw-hint" id="pwHint">
        <span class="dot"></span><span id="pwHintText">Mindestens 8 Zeichen</span>
      </div>
    </div>

    <div class="form-group">
      <label for="pw2" id="lblPw2">Passwort bestätigen</label>
      <input id="pw2" type="password" required minlength="8" autocomplete="new-password" placeholder="••••••••">
    </div>

    <button type="submit" class="btn" id="submitBtn">
      <span id="submitText">Passwort speichern</span>
    </button>
  </form>

  <div class="ok-box" id="okBox"></div>

  <div class="footer-link">
    <a href="/praxis/" id="backLink">← Zurück zum Login</a>
  </div>
</div>

<script>
const API = 'https://praxmate-api.hguencavdi.workers.dev/api';

const I18N = {
  de: {
    title: 'Neues Passwort festlegen',
    subtitle: 'Geben Sie Ihr neues Passwort zwei Mal ein. Min. 8 Zeichen.',
    lbl_pw1: 'Neues Passwort',
    lbl_pw2: 'Passwort bestätigen',
    pw_hint: 'Mindestens 8 Zeichen',
    pw_weak: 'Schwach — gerne länger',
    pw_mid: 'OK — geht auch besser',
    pw_strong: 'Stark!',
    submit: 'Passwort speichern',
    submitting: 'Wird gespeichert...',
    back: '← Zurück zum Login',
    err_no_token: 'Reset-Link ungültig oder fehlt der Token. Bitte erneut anfordern.',
    err_match: 'Die Passwörter stimmen nicht überein.',
    err_short: 'Passwort muss mindestens 8 Zeichen haben.',
    err_generic: 'Etwas ist schiefgelaufen. Versuchen Sie es erneut oder fordern Sie einen neuen Link an.',
    success: 'Passwort erfolgreich geändert. Sie werden in 3 Sekunden zum Login weitergeleitet...',
    title_doc: 'Praxmate — neues Passwort',
  },
  en: {
    title: 'Set new password',
    subtitle: 'Enter your new password twice. Min. 8 characters.',
    lbl_pw1: 'New password',
    lbl_pw2: 'Confirm password',
    pw_hint: 'At least 8 characters',
    pw_weak: 'Weak — go longer',
    pw_mid: 'OK — could be stronger',
    pw_strong: 'Strong!',
    submit: 'Save password',
    submitting: 'Saving...',
    back: '← Back to login',
    err_no_token: 'Reset link invalid or token missing. Please request a new one.',
    err_match: 'Passwords do not match.',
    err_short: 'Password must be at least 8 characters.',
    err_generic: 'Something went wrong. Try again or request a new link.',
    success: 'Password changed successfully. Redirecting to login in 3 seconds...',
    title_doc: 'Praxmate — new password',
  },
  tr: {
    title: 'Yeni şifre belirle',
    subtitle: 'Yeni şifrenizi iki kez girin. Min. 8 karakter.',
    lbl_pw1: 'Yeni şifre',
    lbl_pw2: 'Şifreyi onayla',
    pw_hint: 'En az 8 karakter',
    pw_weak: 'Zayıf — daha uzun olsun',
    pw_mid: 'Kabul edilir — daha güçlü olabilir',
    pw_strong: 'Güçlü!',
    submit: 'Şifreyi kaydet',
    submitting: 'Kaydediliyor...',
    back: '← Girişe dön',
    err_no_token: 'Sıfırlama bağlantısı geçersiz veya token eksik. Lütfen yeni bir tane isteyin.',
    err_match: 'Şifreler eşleşmiyor.',
    err_short: 'Şifre en az 8 karakter olmalı.',
    err_generic: 'Bir şeyler yanlış gitti. Tekrar deneyin veya yeni bir bağlantı isteyin.',
    success: 'Şifre başarıyla değiştirildi. 3 saniye içinde girişe yönlendiriliyorsunuz...',
    title_doc: 'Praxmate — yeni şifre',
  },
};

function detectLang() {
  const stored = localStorage.getItem('praxmate_lang');
  if (['de','en','tr'].includes(stored)) return stored;
  const nav = (navigator.language || 'de').slice(0, 2);
  return ['de','en','tr'].includes(nav) ? nav : 'de';
}
let lang = detectLang();
const t = (k) => (I18N[lang] || I18N.de)[k] || I18N.de[k] || k;

function applyLang() {
  document.documentElement.lang = lang;
  document.title = t('title_doc');
  document.getElementById('title').textContent = t('title');
  document.getElementById('subtitle').textContent = t('subtitle');
  document.getElementById('lblPw1').textContent = t('lbl_pw1');
  document.getElementById('lblPw2').textContent = t('lbl_pw2');
  document.getElementById('submitText').textContent = t('submit');
  document.getElementById('backLink').textContent = t('back');
  onPwInput();
}
applyLang();
if (window.i18n) window.i18n.onChange((l) => { lang = l; applyLang(); });

// ===== Token from URL =====
const urlToken = new URLSearchParams(location.search).get('t');
if (!urlToken) {
  const eb = document.getElementById('errBox');
  eb.textContent = t('err_no_token');
  eb.classList.add('visible');
  document.getElementById('submitBtn').disabled = true;
}

// ===== Password strength indicator =====
const pw1 = document.getElementById('pw1');
const pwHint = document.getElementById('pwHint');
const pwHintText = document.getElementById('pwHintText');
pw1.addEventListener('input', onPwInput);
function onPwInput() {
  const v = pw1.value;
  pwHint.className = 'pw-hint';
  let txt = t('pw_hint');
  if (v.length === 0) {
    // baseline
  } else if (v.length < 8) {
    pwHint.classList.add('weak'); txt = t('pw_weak');
  } else if (v.length < 12 || !/[A-Z]/.test(v) || !/\d/.test(v)) {
    pwHint.classList.add('mid'); txt = t('pw_mid');
  } else {
    pwHint.classList.add('strong'); txt = t('pw_strong');
  }
  pwHintText.textContent = txt;
}

// ===== Submit =====
const form = document.getElementById('resetForm');
const okBox = document.getElementById('okBox');
const errBox = document.getElementById('errBox');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errBox.classList.remove('visible');
  okBox.classList.remove('visible');

  if (!urlToken) {
    errBox.textContent = t('err_no_token');
    errBox.classList.add('visible'); return;
  }

  const a = pw1.value;
  const b = document.getElementById('pw2').value;
  if (a.length < 8) {
    errBox.textContent = t('err_short'); errBox.classList.add('visible'); return;
  }
  if (a !== b) {
    errBox.textContent = t('err_match'); errBox.classList.add('visible'); return;
  }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="loading"></span>' + t('submitting');

  try {
    const res = await fetch(`${API}/public/auth/password/reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: urlToken, new_password: a }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || t('err_generic'));

    okBox.textContent = t('success');
    okBox.classList.add('visible');
    form.style.display = 'none';
    setTimeout(() => { window.location.href = '/praxis/'; }, 3000);
  } catch (err) {
    errBox.textContent = err.message || t('err_generic');
    errBox.classList.add('visible');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<span id="submitText">' + t('submit') + '</span>';
  }
});
</script>
</body>
</html>
